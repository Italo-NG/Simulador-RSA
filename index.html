<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulador RSA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Fira+Code:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/cabecera.css">
  <link rel="stylesheet" href="./css/formulario.css">
  <link rel="stylesheet" href="./css/burbujas.css">
  <link rel="stylesheet" href="./css/resultado.css">
  <link rel="stylesheet" href="./css/pasos.css">
  <link rel="stylesheet" href="./css/botones.css">
  <link rel="stylesheet" href="./css/animaciones.css">
  <link rel="stylesheet" href="./css/responsive.css">
</head>
<body>

  <canvas id="olaCanvas" aria-hidden="true"></canvas>

  <div class="cabecera">
    <h1>Simulador <span class="rsa">RSA</span></h1>
    <p class="subtitulo">Escribe un mensaje, dale dos números primos y cífralo paso a paso</p>
  </div>

  <div class="escenario">

    <div class="chat" id="chat">
      <input id="texto" type="text" placeholder="Escribe el mensaje que quieres cifrar…" autocomplete="off">
      <button class="enviar" id="enviar" title="Empezar a cifrar" aria-label="Cifrar">
        <svg viewBox="0 0 24 24"><path d="M5 12h13M13 6l6 6-6 6"></path></svg>
      </button>
    </div>

    <div class="pista-chat">
      <span class="flecha-abajo"></span> Ahora elige tus dos números primos
    </div>

    <div class="burbujas">
      <div class="burbuja amarilla" id="burbujaP">
        <span class="etiqueta-burbuja">Primer primo <span class="v">p</span></span>
        <input type="number" id="numeroP" placeholder="11" min="2" inputmode="numeric">
        <div class="estado-primo" id="estadoP"></div>
      </div>
      <div class="burbuja roja" id="burbujaQ">
        <span class="etiqueta-burbuja">Segundo primo <span class="v">q</span></span>
        <input type="number" id="numeroQ" placeholder="17" min="2" inputmode="numeric">
        <div class="estado-primo" id="estadoQ"></div>
      </div>
    </div>

  </div>

  <div class="resultado" id="resultado">
    <div class="resultado-inner">
      <div class="tarjeta" id="tarjeta"></div>
    </div>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
